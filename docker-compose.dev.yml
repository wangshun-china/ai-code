# 本地开发环境 - 只启动基础设施
# Java 服务在 IDE 中运行，前端用 npm run dev
#
# 使用方法：
#   1. 创建临时目录: mkdir -p tmp/code_output tmp/code_deploy
#   2. 启动服务: docker compose -f docker-compose.dev.yml up -d
#
# 访问地址：
#   - Nacos 控制台: http://localhost:8848/nacos (nacos/nacos)
#   - Node Builder: http://localhost:8020/health
#   - 部署的应用: http://localhost:8126/{deployKey}/

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: code-craft-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_code_gen
      MYSQL_USER: ai_code_gen_user
      MYSQL_PASSWORD: 12345678
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
      - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: code-craft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 数据库初始化容器（一次性执行）
  nacos-db-init:
    image: mysql:8.0
    container_name: code-craft-nacos-db-init
    environment:
      MYSQL_ROOT_PASSWORD: root123456
    volumes:
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
      - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
    networks:
      - code-craft-network
    restart: "no"
    command: >
      sh -c "
        echo 'Waiting for MySQL...';
        until mysql -h mysql -uroot -proot123456 -e 'SELECT 1' 2>/dev/null; do
          sleep 2;
        done;
        echo 'MySQL is ready, executing init scripts...';
        mysql -h mysql -uroot -proot123456 < /docker-entrypoint-initdb.d/1_create_table.sql;
        mysql -h mysql -uroot -proot123456 < /docker-entrypoint-initdb.d/2_nacos_schema.sql;
        echo 'Initialization completed, exiting...'
      "
    depends_on:
      mysql:
        condition: service_healthy

  # Nacos 服务发现和配置中心
  nacos:
    image: nacos/nacos-server:v2.5.2
    container_name: code-craft-nacos
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms2g -Xss4m"
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: ai_code_gen_user
      MYSQL_SERVICE_PASSWORD: 12345678
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_USERNAME: nacos
      NACOS_AUTH_PASSWORD: nacos
      NACOS_AUTH_TOKEN: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    networks:
      - code-craft-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nacos-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=nacos"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Node.js 构建服务（用于构建生成的 Vue 项目）
  # 挂载本地目录，与 IDE 中运行的 Java 服务共享文件
  node-builder:
    build:
      context: ./node-builder
      dockerfile: Dockerfile
    container_name: code-craft-node-builder
    working_dir: /app
    ports:
      - "8020:8020"
    volumes:
      # 挂载本地代码目录（需要在 Docker Desktop 中配置文件共享）
      - ./tmp/code_output:/tmp/code_output
    environment:
      NODE_ENV: production
      PORT: 8020
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  nacos_logs:
  nacos_data:

networks:
  code-craft-network:
    driver: bridge
