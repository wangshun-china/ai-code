          script: |
            # 创建目标目录（如果不存在）
            mkdir -p /root/yu-ai-code-prod

            cd /root/yu-ai-code-prod

            # 调试：列出目录内容
            echo "=== Directory contents ==="
            ls -la

            # 使用 -f 指定配置文件
            COMPOSE_FILE="-f docker-compose.prod.yml"
            ENV_FILE="--env-file .env.prod"

            echo "=== Step 1: 登录 ACR ==="
            echo "${{ env.ACR_PASSWORD }}" | sudo docker login ${{ env.REGISTRY }} -u aliyun4384550071 --password-stdin

            echo "=== Step 2: 强制停止并删除所有 yu-ai 容器 ==="
            # 强制停止所有运行的 yu-ai 容器
            sudo docker ps -a --filter "name=yu-ai-" -q | xargs -r sudo docker rm -f || true

            echo "=== Step 3: 删除 yu-ai 旧镜像（强制） ==="
            # 先删除容器，再删除镜像
            sudo docker images --format "{{.Repository}}:{{.Tag}}" | \
              grep "wangshun_build/yu-ai-code-mother" | \
              xargs -r sudo docker rmi -f 2>/dev/null || true
            echo "Old yu-ai images removed"

            echo "=== Step 4: 强制拉取最新镜像 ==="
            sudo docker compose $COMPOSE_FILE $ENV_FILE pull --force-recreate

            echo "=== Step 5: 清理任何残留容器 ==="
            sudo docker compose $COMPOSE_FILE $ENV_FILE down --remove-orphans || true

            echo "=== Step 6: 顺序启动服务 ==="
            # 启动 MySQL
            echo "Starting MySQL..."
            sudo docker compose $COMPOSE_FILE $ENV_FILE up -d mysql

            # 等待 MySQL 健康检查通过
            echo "Waiting for MySQL to be healthy..."
            for i in $(seq 1 60); do
              HEALTH=$(sudo docker inspect --format='{{.State.Health.Status}}' yu-ai-mysql 2>/dev/null || echo "starting")
              if [ "$HEALTH" = "healthy" ]; then
                echo "MySQL is healthy!"
                break
              fi
              echo "MySQL status: $HEALTH, waiting... ($i/60)"
              sleep 5
            done

            # 启动 Redis
            echo "Starting Redis..."
            sudo docker compose $COMPOSE_FILE $ENV_FILE up -d redis
            sleep 5

            # 启动 Nacos
            echo "Starting Nacos..."
            sudo docker compose $COMPOSE_FILE $ENV_FILE up -d nacos

            # Nacos 启动需要更长时间（首次需要初始化数据库），等待容器运行后再检查
            sleep 30

            # 等待 Nacos 启动（不依赖健康检查，因为首次启动可能较慢）
            echo "Waiting for Nacos to start..."
            for i in $(seq 1 90); do
              RUNNING=$(sudo docker inspect --format='{{.State.Running}}' yu-ai-nacos 2>/dev/null || echo "false")
              if [ "$RUNNING" = "true" ]; then
                # 再等待一下确保服务就绪
                sleep 20
                echo "Nacos is running!"
                break
              fi
              echo "Nacos not running yet, waiting... ($i/90)"
              sleep 5
            done

            # 启动后端服务
            echo "Starting Backend Services..."
            sudo docker compose $COMPOSE_FILE $ENV_FILE up -d user-service app-service screenshot-service
            sleep 10

            # 启动前端和nginx
            echo "Starting Frontend and Nginx..."
            sudo docker compose $COMPOSE_FILE $ENV_FILE up -d frontend nginx

            echo "=== Step 7: 验证容器状态 ==="
            sudo docker ps | grep yu-ai

            echo "=== Step 8: 清理虚悬镜像 ==="
            sudo docker image prune -f

            echo "Deployment completed!"

            echo "=== Step 6: 验证状态 ==="
            sudo docker ps | grep yu-ai

            echo "=== Step 7: 清理虚悬镜像 ==="
            sudo docker image prune -f

            echo "Deployment completed!"