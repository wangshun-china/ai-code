name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target_env:
        description: '请选择要部署的目标服务器 (默认推送到阿里云)'
        required: true
        default: 'aliyun'
        type: choice
        options:
          - aliyun
          - wsl

env:
  # 镜像仓库配置 (Single Source of Truth)
  REGISTRY: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAMESPACE: wangshun_build/code-craft-ai
  ALIYUN_USERNAME: aliyun4384550071
  ALIYUN_PASSWORD: wangshun817

  # 应用配置
  APP_NAME: code-craft
  DEPLOY_DIR: code-craft-prod

  # 数据库配置
  DB_ROOT_PASSWORD: root123456
  DB_NAME: ai_code_gen
  DB_USER: ai_code_gen_user
  DB_PASSWORD: "12345678"
  DB_PORT: "3307"

  # Redis配置
  REDIS_PORT: "6379"

  # Nacos配置
  NACOS_PORT: "8848"
  NACOS_USERNAME: nacos
  NACOS_PASSWORD: nacos

  # 服务端口
  USER_SERVICE_PORT: "8124"
  APP_SERVICE_PORT: "8126"
  SCREENSHOT_SERVICE_PORT: "8127"
  NODE_BUILDER_PORT: "8020"
  FRONTEND_PORT: "8090"
  NGINX_PORT: "8888"

  # 业务配置
  AI_DASHSCOPE_API_KEY: sk-814d2907354744f4a69661e19ab043bc
  DEEPSEEK_API_KEY: your-deepseek-api-key-here
  COS_SECRET_ID: AKIDsb9W0YDk6rTwHWVLAp3867FsLgseSwGR
  COS_SECRET_KEY: EJDwWvGRQDrTchhnmdaftz374ogvBILD
  COS_REGION: ap-nanjing
  COS_BUCKET: xixibox-blog-pic-1313495082
  COS_HOST: https://xixibox-blog-pic-1313495082.cos.ap-nanjing.myqcloud.com

jobs:
  build:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Backend
        run: cd code-craft-microservice && mvn clean package -DskipTests

      - name: Build Frontend
        run: |
          cd code-craft-frontend
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      - name: Copy Build Artifacts
        run: |
          cp code-craft-microservice/code-craft-user/target/*.jar ./user-service.jar
          cp code-craft-microservice/code-craft-app/target/*.jar ./app-service.jar
          cp code-craft-microservice/code-craft-screenshot/target/*.jar ./screenshot-service.jar
          cp -r code-craft-frontend/dist .

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod-user
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}:user-service-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push App Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}:app-service-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Screenshot Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod-screenshot
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}:screenshot-service-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod-frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}:frontend-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Node Builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod-node-builder
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}:node-builder-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.target_env || 'wsl' }}
    needs: build
    # 神级代码：如果是网页端手动选的就用选的标签，如果是 push 代码自动触发的，默认用 aliyun
    runs-on: [self-hosted, "${{ github.event.inputs.target_env || 'wsl' }}"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Infrastructure
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          DB_ROOT_PASSWORD: ${{ env.DB_ROOT_PASSWORD }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          NACOS_USERNAME: ${{ env.NACOS_USERNAME }}
          NACOS_PASSWORD: ${{ env.NACOS_PASSWORD }}
          AI_DASHSCOPE_API_KEY: ${{ env.AI_DASHSCOPE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ env.DEEPSEEK_API_KEY }}
          COS_SECRET_ID: ${{ env.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ env.COS_SECRET_KEY }}
          COS_REGION: ${{ env.COS_REGION }}
          COS_BUCKET: ${{ env.COS_BUCKET }}
          COS_HOST: ${{ env.COS_HOST }}
          NODE_BUILDER_PORT: ${{ env.NODE_BUILDER_PORT }}
        run: |
          # 创建部署目录
          mkdir -p ${{ env.DEPLOY_DIR }}

          # 复制必要文件到部署目录
          cp ${{ github.workspace }}/nginx.conf ${{ env.DEPLOY_DIR }}/
          cp ${{ github.workspace }}/nginx.frontend.conf ${{ env.DEPLOY_DIR }}/
          cp -r ${{ github.workspace }}/sql ${{ env.DEPLOY_DIR }}/
          cp -r ${{ github.workspace }}/mysql-init ${{ env.DEPLOY_DIR }}/
          cp -r ${{ github.workspace }}/node-builder ${{ env.DEPLOY_DIR }}/

          # 切换到部署目录
          cd ${{ env.DEPLOY_DIR }}

          # 生成环境文件
          cat > .env << EOF
          REGISTRY=${REGISTRY}
          IMAGE_NAMESPACE=${IMAGE_NAMESPACE}
          DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          AI_DASHSCOPE_API_KEY=${AI_DASHSCOPE_API_KEY}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          COS_SECRET_ID=${COS_SECRET_ID}
          COS_SECRET_KEY=${COS_SECRET_KEY}
          COS_REGION=${COS_REGION}
          COS_BUCKET=${COS_BUCKET}
          COS_HOST=${COS_HOST}
          NODE_BUILDER_PORT=${NODE_BUILDER_PORT}
          EOF

          # 生成 docker-compose.yml (Infrastructure as Code)
          cat > docker-compose.yml << 'COMPOSE_EOF'
          services:
            mysql:
              image: mysql:8.0
              container_name: code-craft-mysql
              environment:
                MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
                MYSQL_DATABASE: ${DB_NAME}
                MYSQL_USER: ${DB_USER}
                MYSQL_PASSWORD: ${DB_PASSWORD}
              ports:
                - "3307:3306"
              volumes:
                - mysql_data:/var/lib/mysql
                - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
                - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
              command: --default-authentication-plugin=mysql_native_password
              networks:
                - code-craft-network
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
                interval: 10s
                timeout: 10s
                retries: 10
                start_period: 60s

            redis:
              image: redis:7-alpine
              container_name: code-craft-redis
              ports:
                - "6379:6379"
              volumes:
                - redis_data:/data
              networks:
                - code-craft-network
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 5

            nacos-db-init:
              image: mysql:8.0
              container_name: code-craft-nacos-db-init
              environment:
                MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
              volumes:
                - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
                - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
              networks:
                - code-craft-network
              restart: "no"
              command: >
                sh -c "
                  echo 'Waiting for MySQL...';
                  until mysql -h mysql -uroot -p${DB_ROOT_PASSWORD} -e 'SELECT 1' 2>/dev/null; do
                    sleep 2;
                  done;
                  echo 'MySQL is ready, executing init scripts...';
                  mysql -h mysql -uroot -p${DB_ROOT_PASSWORD} < /docker-entrypoint-initdb.d/1_create_table.sql;
                  mysql -h mysql -uroot -p${DB_ROOT_PASSWORD} < /docker-entrypoint-initdb.d/2_nacos_schema.sql;
                  echo 'Initialization completed, exiting...'
                "
              depends_on:
                mysql:
                  condition: service_healthy

            nacos:
              image: nacos/nacos-server:v2.5.2
              container_name: code-craft-nacos
              environment:
                JAVA_TOOL_OPTIONS: "-Xmx4g -Xms2g -Xss4m"
                MODE: standalone
                SPRING_DATASOURCE_PLATFORM: mysql
                MYSQL_SERVICE_HOST: mysql
                MYSQL_SERVICE_PORT: 3306
                MYSQL_SERVICE_DB_NAME: nacos
                MYSQL_SERVICE_USER: ${DB_USER}
                MYSQL_SERVICE_PASSWORD: ${DB_PASSWORD}
                NACOS_AUTH_ENABLE: "false"
                NACOS_AUTH_USERNAME: ${NACOS_USERNAME:-nacos}
                NACOS_AUTH_PASSWORD: ${NACOS_PASSWORD:-nacos}
              ports:
                - "8848:8848"
                - "9848:9848"
                - "9849:9849"
              volumes:
                - nacos_logs:/home/nacos/logs
                - nacos_data:/home/nacos/data
              networks:
                - code-craft-network
              restart: unless-stopped
              depends_on:
                mysql:
                  condition: service_healthy
                nacos-db-init:
                  condition: service_completed_successfully
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=nacos"]
                interval: 10s
                timeout: 5s
                retries: 10

            user-service:
              image: ${REGISTRY}/${IMAGE_NAMESPACE}:user-service-latest
              container_name: code-craft-user-service
              environment:
                JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m -XX:+UseG1GC"
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: ${DB_NAME}
                DB_USER: ${DB_USER}
                DB_PASSWORD: ${DB_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ""
                NACOS_HOST: nacos
                NACOS_PORT: 8848
                AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY}
                DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
              ports:
                - "8124:8124"
              networks:
                - code-craft-network
              restart: unless-stopped
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                nacos:
                  condition: service_started

            app-service:
              image: ${REGISTRY}/${IMAGE_NAMESPACE}:app-service-latest
              container_name: code-craft-app-service
              environment:
                JAVA_TOOL_OPTIONS: "-Xmx1024m -Xms512m -XX:+UseG1GC"
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: ${DB_NAME}
                DB_USER: ${DB_USER}
                DB_PASSWORD: ${DB_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ""
                NACOS_HOST: nacos
                NACOS_PORT: 8848
                AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY}
                DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
                COS_SECRET_ID: ${COS_SECRET_ID}
                COS_SECRET_KEY: ${COS_SECRET_KEY}
                DEPLOY_HOST: http://localhost
                CODE_OUTPUT_DIR: /tmp/code_output
                CODE_DEPLOY_DIR: /tmp/code_deploy
                NODE_BUILDER_URL: http://node-builder:${NODE_BUILDER_PORT:-8020}/build
              ports:
                - "8126:8126"
              volumes:
                - code_output:/tmp/code_output
                - code_deploy:/tmp/code_deploy
              networks:
                - code-craft-network
              restart: unless-stopped
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                nacos:
                  condition: service_started
                node-builder:
                  condition: service_started

            screenshot-service:
              image: ${REGISTRY}/${IMAGE_NAMESPACE}:screenshot-service-latest
              container_name: code-craft-screenshot-service
              shm_size: '512mb'
              environment:
                JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
                DB_HOST: mysql
                DB_PORT: 3306
                DB_NAME: ${DB_NAME}
                DB_USER: ${DB_USER}
                DB_PASSWORD: ${DB_PASSWORD}
                REDIS_HOST: redis
                REDIS_PORT: 6379
                REDIS_PASSWORD: ""
                NACOS_HOST: nacos
                NACOS_PORT: 8848
                COS_SECRET_ID: ${COS_SECRET_ID}
                COS_SECRET_KEY: ${COS_SECRET_KEY}
                COS_REGION: ${COS_REGION}
                COS_BUCKET: ${COS_BUCKET}
                COS_HOST: ${COS_HOST}
              deploy:
                resources:
                  limits:
                    memory: 1G
                  reservations:
                    memory: 256M
              ports:
                - "8127:8127"
              networks:
                - code-craft-network
              restart: unless-stopped
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                nacos:
                  condition: service_started

            node-builder:
              image: ${REGISTRY}/${IMAGE_NAMESPACE}:node-builder-latest
              container_name: code-craft-node-builder
              working_dir: /app
              volumes:
                - code_output:/tmp/code_output
              environment:
                NODE_ENV: production
                PORT: ${NODE_BUILDER_PORT:-8020}
              networks:
                - code-craft-network
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NODE_BUILDER_PORT:-8020}/health"]
                interval: 30s
                timeout: 10s
                start_period: 10s
                retries: 3

            frontend:
              image: ${REGISTRY}/${IMAGE_NAMESPACE}:frontend-latest
              container_name: code-craft-frontend
              restart: unless-stopped
              networks:
                - code-craft-network
              ports:
                - "8090:80"
              depends_on:
                app-service:
                  condition: service_started
                user-service:
                  condition: service_started
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
                interval: 30s
                timeout: 10s
                start_period: 10s
                retries: 3

            nginx:
              image: nginx:alpine
              container_name: code-craft-nginx
              restart: unless-stopped
              ports:
                - "8888:80"
                - "443:443"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf
                - code_deploy:/usr/share/nginx/html/deploy
              networks:
                - code-craft-network
              depends_on:
                frontend:
                  condition: service_started
                user-service:
                  condition: service_started
                app-service:
                  condition: service_started
                screenshot-service:
                  condition: service_started
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
                interval: 30s
                timeout: 10s
                start_period: 10s
                retries: 3

          volumes:
            mysql_data:
            redis_data:
            nacos_logs:
            nacos_data:
            code_deploy:
            code_output:

          networks:
            code-craft-network:
              driver: bridge
          COMPOSE_EOF

          echo "=== Generated docker-compose.yml ==="
          head -50 docker-compose.yml

      - name: Login to Registry
        run: |
          echo "${{ env.ALIYUN_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ env.ALIYUN_USERNAME }} --password-stdin

      - name: Deploy Services
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "=== Step 1: Force Cleanup All Existing Containers ==="

          # 1. 先尝试 docker compose down（如果之前有配置文件）
          docker compose down --remove-orphans 2>/dev/null || true

          # 2. 强制停止并删除所有 code-craft 相关容器（包括之前部署的）
          echo "Force removing any existing containers..."
          docker ps -a --filter "name=code-craft" -q 2>/dev/null | xargs -r docker stop -t 5 2>/dev/null || true
          docker ps -a --filter "name=code-craft" -q 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true

          # 3. 删除可能存在的旧项目容器（包括 mysql、redis 等基础设施）
          for container in code-craft-mysql code-craft-redis code-craft-nacos code-craft-user-service code-craft-app-service code-craft-screenshot-service code-craft-frontend code-craft-nginx code-craft-node-builder code-craft-nacos-db-init; do
            if docker ps -a --format "{{.Names}}" | grep -q "^${container}$"; then
              echo "Removing existing container: $container"
              docker stop -t 5 "$container" 2>/dev/null || true
              docker rm -f "$container" 2>/dev/null || true
            fi
          done

          # 4. 确认所有容器已删除
          echo "Verifying cleanup..."
          for i in {1..10}; do
            COUNT=$(docker ps -a --filter "name=code-craft" -q 2>/dev/null | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "✓ All containers removed"
              break
            fi
            echo "Still have $COUNT containers, retrying... ($i/10)"
            docker ps -a --filter "name=code-craft" -q 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
            sleep 1
          done

          # 5. 清理孤立卷和网络
          docker volume prune -f 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

          echo "=== Step 2: Pull Latest Images ==="
          docker compose pull

          echo "=== Step 3: Start Infrastructure ==="
          docker compose up -d mysql redis

          # Wait for MySQL
          echo "Waiting for MySQL..."
          for i in {1..60}; do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' code-craft-mysql 2>/dev/null || echo "starting")
            if [ "$HEALTH" = "healthy" ]; then
              echo "✓ MySQL healthy"
              break
            fi
            sleep 5
          done

          # Wait for Redis
          sleep 3

          echo "=== Step 4: Start Nacos ==="
          docker compose up -d nacos-db-init nacos
          for i in {1..90}; do
            RUNNING=$(docker inspect --format='{{.State.Running}}' code-craft-nacos 2>/dev/null || echo "false")
            if [ "$RUNNING" = "true" ]; then
              sleep 20
              echo "✓ Nacos running"
              break
            fi
            sleep 5
          done

          echo "=== Step 5: Start Backend Services ==="
          docker compose up -d user-service app-service screenshot-service
          for i in {1..30}; do
            USER=$(docker inspect --format='{{.State.Health.Status}}' code-craft-user-service 2>/dev/null || echo "starting")
            APP=$(docker inspect --format='{{.State.Health.Status}}' code-craft-app-service 2>/dev/null || echo "starting")
            if [ "$USER" = "healthy" ] && [ "$APP" = "healthy" ]; then
              echo "✓ Backend services healthy"
              break
            fi
            sleep 5
          done

          echo "=== Step 6: Start Frontend & Nginx ==="
          docker compose up -d frontend nginx

          echo "=== Step 7: Verify ==="
          docker ps | grep code-craft
          docker image prune -f

          echo "✓ Deployment completed!"
