jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建后端 - 生成 Fat JAR
      - name: Build backend with Maven
        run: cd yu-ai-code-mother-microservice && mvn clean package -DskipTests

      # Step 4: 安装 Node.js 并构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd yu-ai-code-mother-frontend
          npm install -g pnpm
          pnpm install
          pnpm run build
          ls -la dist/  # 调试：检查 dist 目录内容

      # 检查 dist 目录是否有内容
      - name: Verify dist exists
        run: |
          if [ ! -d "yu-ai-code-mother-frontend/dist" ] || [ -z "$(ls -A yu-ai-code-mother-frontend/dist)" ]; then
            echo "Error: dist directory is empty or does not exist!"
            exit 1
          fi
          echo "dist directory contains: $(ls -la yu-ai-code-mother-frontend/dist)"

      # Step 5: 登录阿里云仓库
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aliyun4384550071
          password: ${{ env.ACR_PASSWORD }}

      # Step 6: 复制 JAR 文件到根目录 (Dockerfile 需要从根目录 COPY)
      - name: Copy JAR files to root
        run: |
          cp yu-ai-code-mother-microservice/yu-ai-code-user/target/*.jar ./user-service.jar
          cp yu-ai-code-mother-microservice/yu-ai-code-app/target/*.jar ./app-service.jar
          cp yu-ai-code-mother-microservice/yu-ai-code-screenshot/target/*.jar ./screenshot-service.jar

      # Step 6.1: 复制前端 dist 到根目录
      - name: Copy frontend files to root
        run: |
          cp -r yu-ai-code-mother-frontend/dist .
          # nginx.conf 已在根目录，不需要复制

      # Step 7: 构建并推送后端服务镜像
      # 7.1 User Service
      - name: Build and push user-service
        run: |
          docker build -f Dockerfile.prod-user -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:user-service .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:user-service

      # 7.2 App Service
      - name: Build and push app-service
        run: |
          docker build -f Dockerfile.prod-app -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-service .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-service

      # 7.3 Screenshot Service
      - name: Build and push screenshot-service
        run: |
          docker build -f Dockerfile.prod-screenshot -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:screenshot-service .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:screenshot-service

      # Step 8: 构建并推送前端 Dashboard 镜像
      - name: Build and push frontend
        run: |
          docker build -f Dockerfile.prod-frontend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:frontend

