spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:yu_ai_code_mother}
    username: ${DB_USER:yu_ai_code_mother_user}
    password: ${DB_PASSWORD:12345678}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      ttl: 3600
  session:
    store-type: redis
    timeout: 2592000
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
  # mvc:
  #   servlet:
  #     path: /api
server:
  servlet:
    context-path: /
    session:
      cookie:
        max-age: 2592000
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: glm-5
      max-tokens: 8192
      log-requests: false
      log-responses: false
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: glm-5
      max-tokens: 8192
      log-requests: false
      log-responses: false
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: glm-5
      max-tokens: 32768
      temperature: 0.1
      log-requests: false
      log-responses: false
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: glm-5
      max-tokens: 100
      log-requests: false
      log-responses: false
dubbo:
  registry:
    address: nacos://${NACOS_HOST:nacos}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50053
    host: ${DUBBO_HOST:localhost}
  consumer:
    timeout: 120000
  provider:
    timeout: 120000
code:
  deploy-host: ${DEPLOY_HOST:http://localhost}
  node-builder-url: ${NODE_BUILDER_URL:http://node-builder:3000/build}
  # 构建模式：local（本地构建，使用容器内 npm 命令）| remote（远程构建，调用 node-builder 服务）
  build-mode: ${BUILD_MODE:remote}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}
dashscope:
  api-key: ${AI_DASHSCOPE_API_KEY:}
  image-model: wan2.2-t2i-flash