spring:
  application:
    name: yu-ai-code-app
  # session
  session:
    store-type: redis
    # 30 days expire
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: yu_ai_code_mother_user
    password: 12345678
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      ttl: 3600
  profiles:
    active: local
    #SpringAIAlibaba
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: deepseek-v3.2
server:
  port: 8126
  servlet:
    context-path: /
    # 30 days expire
    session:
      cookie:
        max-age: 2592000
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      max-tokens: 8192
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      max-tokens: 8192
      log-requests: true
      log-responses: true
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      max-tokens: 32768
      temperature: 0.1
      log-requests: true
      log-responses: true
    # 智能路由 AI 模型配置
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY}
      model-name: qwen3.5-plus
      max-tokens: 100
      log-requests: true
      log-responses: true



# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Dubbo
dubbo:
  application:
  # 👇 必须加上这几行来解决冲突
    qos-enable: true
    qos-port: 55555  # 随便改个不一样的，比如 33333
    qos-accept-foreign-ip: false
  registry:
    address: nacos://localhost:8848?username=nacos&password=nacos
    register-mode: instance
#    parameters:
#      ${NACOS_SERVER_IDENTITY_STANDALONE_KEY}: ${NACOS_SERVER_IDENTITY_STANDALONE_VALUE}
  protocol:
    name: tri
    port: 50053
    host: localhost
  consumer:
    timeout: 120000
  provider:
    timeout: 120000
code:
  # 1. 本地部署域名 (不要带最后的斜杠)
  deploy-host: http://localhost:8126
  # 2. Node 地址 (填回环地址，仅在远程构建模式下使用)
  node-builder-url: http://node-builder:3000/build
  # 3. 构建模式：local（本地构建，使用本地 npm 命令）| remote（远程构建，调用 node-builder 服务）
  build-mode: local