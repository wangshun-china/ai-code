spring:
  application:
    name: yu-ai-code-app
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:yu_ai_code_mother}?serverTimezone=Asia/Shanghai&useLegacyDatetimeCode=false
    username: ${DB_USER:yu_ai_code_mother_user}
    password: ${DB_PASSWORD:12345678}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      ttl: 3600
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}

server:
  port: 8126
  servlet:
    context-path: /
    session:
      cookie:
        max-age: 2592000

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.5-plus
      max-tokens: 8192
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.5-plus
      max-tokens: 8192
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.5-plus
      max-tokens: 32768
      temperature: 0.1
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.5-plus
      max-tokens: 100
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yupi.yuaicodemother.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

dubbo:
  application:
    qos-enable: true
    qos-port: 55555
    qos-accept-foreign-ip: false
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50053
    host: ${DUBBO_HOST:localhost}
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

code:
  deploy-host: ${DEPLOY_HOST:http://localhost:8126}
  node-builder-url: ${NODE_BUILDER_URL:http://localhost:3000/build}
  build-mode: ${BUILD_MODE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}

dashscope:
  api-key: ${AI_DASHSCOPE_API_KEY:}
  image-model: wan2.2-t2i-flash