user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # 负载均衡配置
    upstream user_service {
        server yu-ai-user-service:8124;
    }

    upstream app_service {
        server yu-ai-app-service:8126;
    }

    upstream screenshot_service {
        server yu-ai-screenshot-service:8127;
    }

    # Gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html/dist;

        # 前端静态文件（构建后的Vue应用）
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /dist/ {
            alias /usr/share/nginx/html/dist/;
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 部署的静态应用（一键部署生成的应用）
        location /deploy/ {
            alias /usr/share/nginx/html/deploy/;
            try_files $uri $uri/ /deploy/$1/index.html;
            autoindex off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location /api/static/ {
            # 对应 docker-compose 中挂载的路径: - code_output:/usr/share/nginx/html/output
            alias /usr/share/nginx/html/output/;
            
            # 允许跨域（预览通常需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            
            # 禁用缓存，保证生成后能立刻看到
            expires -1;
            
            # 默认文件
            index index.html;
        }

        # API反向代理（主应用服务）
        location /api/ {
            # 去掉 /api 前缀，因为后端服务的 context-path 是 /
            #rewrite ^/api/(.*) /$1 break;
            #rewrite ^/api/(.*) /api/api/$1 break;
            proxy_pass http://app_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 增加超时时间
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 支持WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 用户服务API
        location /api/user/ {
            # 用户服务的 context-path 是 /api，所以保留 /api 前缀
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 截图服务API
        location /api/screenshot {
            # 截图服务的 context-path 是 /api，所以保留 /api 前缀
            proxy_pass http://screenshot_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        # 部署的子应用访问（格式：/随机字符串/）
        # 匹配6位及以上字母数字组合
        location ~ "^/(?!assets/|api/|static/|user-api/|screenshot-api/|deploy/)[A-Za-z0-9]{6,}/" {
            # 这里的逻辑是：
            # 请求：/0ZAb2J/index.html
            # 加上 root：/usr/share/nginx/html/deploy/0ZAb2J/index.html
            root /usr/share/nginx/html/deploy;

            index index.html;
            # 优先查找文件，如果不存在则返回404
            # 注意：生成的Vue项目是SPA，需要前端路由支持
            # 这里使用更简单的方案：让子应用自己处理路由
            try_files $uri $uri/ =404;

            # 针对部署应用的静态资源缓存
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 处理子应用的前端路由（SPA fallback）
        # 这个location会捕获所有未被上面location匹配的请求
        # 但需要排除静态文件扩展名
        location ~ "^/(?!assets/|api/|static/|user-api/|screenshot-api/|deploy/)[A-Za-z0-9]{6,}/.*" {
            root /usr/share/nginx/html/deploy;
            try_files $uri /$1/index.html;
        }

        # 处理不带末尾斜杠的子应用URL，重定向到带斜杠的版本
        location ~ "^/(?!assets/|api/|static/|user-api/|screenshot-api/|deploy/)[A-Za-z0-9]{6,}$" {
            return 301 $uri/;
        }

        # 静态资源访问（兼容旧路径）
        location /static/ {
            proxy_pass http://app_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}