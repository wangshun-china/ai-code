services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: code-craft-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_code_gen
      MYSQL_USER: ai_code_gen_user
      MYSQL_PASSWORD: 12345678
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
      - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: code-craft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos数据库初始化容器（一次性执行）
  nacos-db-init:
    image: mysql:8.0
    container_name: code-craft-nacos-db-init
    environment:
      MYSQL_ROOT_PASSWORD: root123456
    volumes:
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/1_create_table.sql
      - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/2_nacos_schema.sql
    networks:
      - code-craft-network
    restart: "no"
    # 执行完 SQL 后立即退出
    command: >
      sh -c "
        echo 'Waiting for MySQL...';
        until mysql -h mysql -uroot -proot123456 -e 'SELECT 1' 2>/dev/null; do
          sleep 2;
        done;
        echo 'MySQL is ready, executing init scripts...';
        mysql -h mysql -uroot -proot123456 < /docker-entrypoint-initdb.d/1_create_table.sql;
        mysql -h mysql -uroot -proot123456 < /docker-entrypoint-initdb.d/2_nacos_schema.sql;
        echo 'Initialization completed, exiting...'
      "
    depends_on:
      mysql:
        condition: service_healthy

  # Nacos服务发现和配置中心
  nacos:
    image: nacos/nacos-server:v2.5.2
    container_name: code-craft-nacos
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms2g -Xss4m "
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: ai_code_gen_user
      MYSQL_SERVICE_PASSWORD: 12345678
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_USERNAME: nacos
      NACOS_AUTH_PASSWORD: nacos
      NACOS_AUTH_TOKEN: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    networks:
      - code-craft-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nacos-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=nacos"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 用户微服务
  user-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/code-craft-ai:user-service
    container_name: code-craft-user-service
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m -XX:+UseG1GC"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_code_gen
      DB_USER: ai_code_gen_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8124:8124"
    networks:
      - code-craft-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started

  # 主应用微服务
  app-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/code-craft-ai:app-service
    container_name: code-craft-app-service
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx1024m -Xms512m -XX:+UseG1GC"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_code_gen
      DB_USER: ai_code_gen_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      DEPLOY_HOST: ${DEPLOY_HOST:-http://localhost}
      NODE_BUILDER_URL: http://node-builder:3000/build
    ports:
      - "8126:8126"
    volumes:
      - code_output:/tmp/code_output
      - code_deploy:/tmp/code_deploy
    networks:
      - code-craft-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
      node-builder:
        condition: service_started

  # 截图微服务（基于 Playwright，比 Selenium 更轻量）
  screenshot-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/code-craft-ai:screenshot-service
    container_name: code-craft-screenshot-service
    shm_size: '512mb'
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_code_gen
      DB_USER: ai_code_gen_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_HOST: ${COS_HOST:-}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "8127:8127"
    networks:
      - code-craft-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started

  # Node.js 构建服务（用于构建 Vue 项目）
  node-builder:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/code-craft-ai:node-builder
    container_name: code-craft-node-builder
    working_dir: /app
    volumes:
      - code_output:/tmp/code_output
    environment:
      NODE_ENV: production
    # 不需要对外暴露端口，只在内部网络使用
    networks:
      - code-craft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # 前端
  frontend:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/code-craft-ai:frontend
    container_name: code-craft-frontend
    restart: unless-stopped
    networks:
      - code-craft-network
    ports:
      - "8090:80"
    depends_on:
      app-service:
        condition: service_started
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # Nginx反向代理和负载均衡
  nginx:
    image: nginx:alpine
    container_name: code-craft-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - code_deploy:/usr/share/nginx/html/deploy
    networks:
      - code-craft-network
    depends_on:
      frontend:
        condition: service_started
      user-service:
        condition: service_started
      app-service:
        condition: service_started
      screenshot-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  nacos_logs:
  nacos_data:
  code_deploy:
  code_output:

networks:
  code-craft-network:
    driver: bridge