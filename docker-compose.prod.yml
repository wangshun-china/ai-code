services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: yu-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: yu_ai_code_mother
      MYSQL_USER: yu_ai_code_mother_user
      MYSQL_PASSWORD: 12345678
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/create_table.sql
      - ./mysql-init/mysql-schema.sql:/docker-entrypoint-initdb.d/nacos-schema.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - yu-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: yu-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - yu-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos服务发现和配置中心
  nacos:
    image: nacos/nacos-server:v2.5.2
    container_name: yu-ai-nacos
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms2g -Xss4m "
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: yu_ai_code_mother
      MYSQL_SERVICE_USER: yu_ai_code_mother_user
      MYSQL_SERVICE_PASSWORD: 12345678
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_USERNAME: nacos
      NACOS_AUTH_PASSWORD: nacos
      NACOS_AUTH_TOKEN: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    networks:
      - yu-ai-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=nacos"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 用户微服务
  user-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/yu-ai-code-mother:user-service
    container_name: yu-ai-user-service
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: yu_ai_code_mother
      DB_USER: yu_ai_code_mother_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8124:8124"
    networks:
      - yu-ai-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started

  # 主应用微服务
  app-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/yu-ai-code-mother:app-service
    container_name: yu-ai-app-service
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx1024m -Xms512m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: yu_ai_code_mother
      DB_USER: yu_ai_code_mother_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      DEPLOY_HOST: ${DEPLOY_HOST:-http://localhost}
    ports:
      - "8126:8126"
    networks:
      - yu-ai-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started

  # 截图微服务
  screenshot-service:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/yu-ai-code-mother:screenshot-service
    container_name: yu-ai-screenshot-service
    shm_size: '2gb'
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms2g -Xss4m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: yu_ai_code_mother
      DB_USER: yu_ai_code_mother_user
      DB_PASSWORD: 12345678
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_HOST: ${COS_HOST:-}
    ports:
      - "8127:8127"
    networks:
      - yu-ai-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started

  # 前端
  frontend:
    image: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com/wangshun_build/yu-ai-code-mother:frontend
    container_name: yu-ai-frontend
    restart: unless-stopped
    networks:
      - yu-ai-network
    ports:
      - "8090:80"
    depends_on:
      app-service:
        condition: service_started
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # Nginx反向代理和负载均衡
  nginx:
    image: nginx:alpine
    container_name: yu-ai-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - code_deploy:/usr/share/nginx/html/deploy
    networks:
      - yu-ai-network
    depends_on:
      frontend:
        condition: service_started
      user-service:
        condition: service_started
      app-service:
        condition: service_started
      screenshot-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  nacos_logs:
  nacos_data:
  code_deploy:

networks:
  yu-ai-network:
    driver: bridge