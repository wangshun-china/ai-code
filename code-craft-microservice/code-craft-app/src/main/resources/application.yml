spring:
  application:
    name: code-craft-app
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  session:
    store-type: redis
    timeout: 2592000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ai_code_gen}?serverTimezone=Asia/Shanghai&useLegacyDatetimeCode=false
    username: ${DB_USER:ai_code_gen_user}
    password: ${DB_PASSWORD:12345678}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      ttl: 3600
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}

server:
  port: 8126
  servlet:
    context-path: /
    session:
      cookie:
        max-age: 2592000

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.6-plus
      max-tokens: 8192
      timeout: ${AI_CHAT_TIMEOUT:180s}
      max-retries: ${AI_CHAT_MAX_RETRIES:1}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.6-plus
      max-tokens: 8192
      timeout: ${AI_STREAMING_TIMEOUT:600s}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    reasoning-streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.6-plus
      max-tokens: 32768
      temperature: 0.1
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model-name: qwen3.6-plus
      max-tokens: 100
      timeout: ${AI_ROUTING_TIMEOUT:60s}
      max-retries: ${AI_ROUTING_MAX_RETRIES:1}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ws.codecraft.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

dubbo:
  application:
    qos-enable: true
    qos-port: 55555
    qos-accept-foreign-ip: false
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50053
    host: ${DUBBO_HOST:localhost}
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

code:
  deploy-host: ${DEPLOY_HOST:http://localhost:8126}
  node-builder-url: ${NODE_BUILDER_URL:http://localhost:8020/build}
  build-mode: ${BUILD_MODE:local}
  output-root-dir: ${CODE_OUTPUT_DIR:G:/project/code-craft/tmp/code_output}
  deploy-root-dir: ${CODE_DEPLOY_DIR:G:/project/code-craft/tmp/code_deploy}
  upload-root-dir: ${CODE_UPLOAD_DIR:G:/project/code-craft/tmp/uploads}

app:
  database:
    init:
      enabled: ${APP_DATABASE_INIT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}

dashscope:
  api-key: ${AI_DASHSCOPE_API_KEY:}
  image-model: wan2.2-t2i-flash
