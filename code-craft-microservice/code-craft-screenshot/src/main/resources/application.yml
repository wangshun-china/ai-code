spring:
  application:
    name: code-craft-screenshot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ai_code_gen}?serverTimezone=Asia/Shanghai&useLegacyDatetimeCode=false
    username: ${DB_USER:ai_code_gen_user}
    password: ${DB_PASSWORD:12345678}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}

server:
  port: 8127
  servlet:
    context-path: /api

cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}

dubbo:
  application:
    qos-enable: true
    qos-port: 33333
    qos-accept-foreign-ip: false
  registry:
    address: nacos://${NACOS_HOST:localhost}:${NACOS_PORT:8848}?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50052
    host: ${DUBBO_HOST:localhost}
  consumer:
    timeout: 120000
  provider:
    timeout: 120000
    executor: virtual-thread

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always